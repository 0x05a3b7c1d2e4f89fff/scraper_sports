name: OVO Updater

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for rebasing and history management

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright httpx[http2] pytz selectolax requests beautifulsoup4
          playwright install chromium

      - name: Run updater
        run: |
          # Ensure local modules can be found
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python ovo/ovo.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Stage specific output files
          git add ovo_vlc.m3u8 ovo_tivimate.m3u8

          # Check if there are actual changes to commit
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Auto update OVO playlist"

          # Retry logic for pushing to handle race conditions
          for i in {1..3}; do
            echo "Attempt $i: Pulling and pushing..."
            git pull --rebase origin main && git push origin main && break || {
              echo "Attempt $i failed. Retrying in 5 seconds..."
              sleep 5
            }
          done
