name: ▶️ s4f Stream Scraper (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run s4f scraper
        run: python s4f/scraper.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add JSON, M3U8, and EPG
          git add s4f/s4f_data.json s4f/s4f_playlist.m3u8 s4f/s4f_epg.xml
          
          if ! git diff --cached --quiet; then
            git commit -m "s4f update: Fixed localhost URLs and categorized groups – $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "No changes detected."
          fi
