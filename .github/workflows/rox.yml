name: ▶️ Update RoxieStreams

on:
  schedule:
    - cron: '*/30 * * * *'  # ⏰ Runs every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # ⚡ Speeds up runs by caching dependencies

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 🎯 Run RoxieStreams scraper
        run: python rox.py

      - name: 💾 Commit & Push if Playlist Changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Roxiestreams.m3u

          if git diff --cached --quiet; then
            echo "✅ No changes detected — skipping commit."
            exit 0
          fi

          git commit -m "✅ Updated ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          # Use a loop for more reliable pushing if 30-min runs overlap
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "🚀 Push successful"
              exit 0
            fi
            sleep $((RANDOM % 10 + 5))
          done
          echo "❌ Failed to push after 3 attempts"
          exit 1
